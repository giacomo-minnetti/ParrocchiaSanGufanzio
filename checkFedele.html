<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Controllo QR - Parrocchia</title>
    <style>
        :root{
            --bg: #0f1724;
            --bg-2: linear-gradient(135deg,#071028 0%,#11243a 100%);
            --card: rgba(255,255,255,0.03);
            --glass: rgba(255,255,255,0.06);
            --accent: #4f46e5;
            --text: #e6eef8;
            --muted: #9fb0c8;
            --radius: 12px;
            --shadow: 0 6px 18px rgba(3,7,18,0.6);
            --transition: 200ms cubic-bezier(.2,.8,.2,1);
        }
        *{box-sizing:border-box}
        html,body{height:100%;margin:0;overflow:hidden}
        body{
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto;
            background: var(--bg-2);
            color:var(--text);
            padding:16px;
            -webkit-font-smoothing:antialiased;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }
        .container{
            max-width:100%;
            width:100%;
            display:flex;
            flex-direction:column;
            gap:16px;
        }
        .card{
            background:var(--card);
            border-radius:var(--radius);
            padding:20px;
            box-shadow:var(--shadow);
            border:1px solid rgba(255,255,255,0.02);
            backdrop-filter:blur(6px);
        }
        .card h3{margin:0 0 16px 0;font-size:18px;color:var(--text);text-align:center}
        #video{
            width:100%;
            height:auto;
            aspect-ratio:3/4;
            border-radius:10px;
            display:block;
            background:#000;
            object-fit:cover;
        }
        #canvas{display:none}
        .buttons{
            display:flex;
            gap:12px;
            justify-content:center;
            margin-top:16px;
        }
        button{
            padding:12px 24px;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:all var(--transition);
            background:var(--accent);
            color:#fff;
        }
        button:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,70,229,0.4)}
        button:active{transform:translateY(0)}
        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(4px);
            z-index:1000;
            justify-content:center;
            align-items:center;
            animation:fadeIn var(--transition);
        }
        .modal.show{display:flex}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal-content{
            background:var(--card);
            border-radius:var(--radius);
            padding:32px;
            box-shadow:var(--shadow);
            border:1px solid rgba(255,255,255,0.02);
            backdrop-filter:blur(6px);
            max-width:400px;
            text-align:center;
            animation:slideUp var(--transition);
        }
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal-content h2{margin:0 0 16px 0;font-size:24px}
        .modal-content .icon{font-size:48px;margin-bottom:16px}
        .modal-content p{margin:16px 0;font-size:16px;color:var(--muted)}
        .modal-content button{width:100%;margin-top:24px}
        .success-text{color:#6ee7b7}
        .error-text{color:#fca5a5}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>Controllo Fedele</h3>
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="buttons">
                <button onclick="startCameraHandler()">▶ Avvia</button>
                <button onclick="stopCamera()">⏹ Ferma</button>
                <button onclick="resetResult()">↻ Azzera</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div id="modalIcon" class="icon"></div>
            <h2 id="modalTitle"></h2>
            <p id="modalMessage"></p>
            <button onclick="closeModal()">Chiudi</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        let validCodes = [];
        let lastScanned = '';
        let scanning = false;

        async function loadValidCodes() {
            try {
                const response = await fetch('fidelilist.txt');
                const text = await response.text();
                validCodes = text.split('\n').map(line => line.trim()).filter(line => line);
            } catch (err) {
                showModal('Errore', 'Errore caricamento file', '✗', false);
                console.error(err);
            }
        }

        async function startCameraHandler() {
            if (!scanning) {
                await startCamera();
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
                await video.play();
                
                // Wait for video metadata to load
                await new Promise((resolve) => {
                    if (video.readyState >= video.HAVE_FUTURE_DATA) {
                        resolve();
                    } else {
                        video.onloadedmetadata = () => resolve();
                    }
                });
                
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                scanning = true;
                scanLoop();
            } catch (err) {
                showModal('Errore', 'Errore accesso fotocamera', '✗', false);
                console.error(err);
            }
        }

        function stopCamera() {
            scanning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        function resetResult() {
            lastScanned = '';
            modal.classList.remove('show');
        }

        function scanLoop() {
            if (!scanning) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
                if (code && code.data && code.data !== lastScanned) {
                    lastScanned = code.data;
                    checkCode(code.data);
                }
            }
            requestAnimationFrame(scanLoop);
        }

        function checkCode(data) {
            if (validCodes.includes(data)) {
                showModal('Fedele Riconosciuto', `Codice: ${data}`, '✓', true);
            } else {
                showModal('Fedele Non Valido', `Codice: ${data}`, '✗', false);
            }
        }

        function showModal(title, message, icon, isSuccess) {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalIcon.textContent = icon;
            modalIcon.className = 'icon ' + (isSuccess ? 'success-text' : 'error-text');
            modal.classList.add('show');
        }

        function closeModal() {
            modal.classList.remove('show');
            lastScanned = '';
        }

        loadValidCodes();
    </script>
</body>
</html>
