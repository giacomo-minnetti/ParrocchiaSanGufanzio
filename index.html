<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrocchia San Gufanzio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        .HomeMenu {
            padding: 16px;
            background: var(--card);
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .brand h1 {
            margin: 0;
            font-size: 18px;
        }
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .header {
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0;
            font-size: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: var(--radius);
            padding: 16px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: var(--radius);
            font-size: 16px;
            background: var(--card);
            color: var(--text);
            transition: background var(--transition);
        }
        input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            background: rgba(255,255,255,0.06);
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        #code-display {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: var(--radius);
        }
        #code-value {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            color: var(--accent-2);
        }
        #qr-code {
            text-align: center;
            margin: 15px 0;
        }
        @media (max-width: 600px) {
            .app {
                height: 100vh;
            }
            .main {
                padding: 12px;
            }
            .card {
                padding: 14px;
            }
            input[type="email"], input[type="password"] {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="HomeMenu">
            <div class="brand">
                <div class="logo"></div>
                <h1>San Gufanzio</h1>
            </div>
        </aside>
        
        <main class="main">
            <div class="header">
                <h2>Parrocchia San Gufanzio</h2>
            </div>
            
            <div class="card">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Inserisci la tua email">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Inserisci la tua password">
                </div>
                <button class="btn" onclick="generateCode()">Genera Codice</button>
                
                <div id="code-display">
                    <h3 style="margin:0 0 12px 0; color:var(--text); font-size:16px;">Codice Generato:</h3>
                    <div id="code-value"></div>
                    <div id="qr-code"></div>
                    <button id="wallet-btn" class="btn" onclick="addToWallet()">Aggiungi a Wallet</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function generateHash(email, password) {
            const combined = email + password;
            const encoder = new TextEncoder();
            const data = encoder.encode(combined);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function generateFinalToken(firstHash) {
            try {
                const r = await fetch('/generate_token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({firstHash})
                });
                if (r.ok) {
                    const j = await r.json();
                    return j.token || firstHash;
                }
            } catch(e) {}
            return firstHash;
        }

        async function generateCode() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Inserisci email e password');
                return;
            }
            
            const hash = await generateHash(email, password);
            const token = await generateFinalToken(hash);
            
            document.getElementById('code-value').textContent = token;
            
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: token,
                width: 200,
                height: 200
            });
            
            document.getElementById('code-display').style.display = 'block';
            updateWalletButton();
        }

        function updateWalletButton() {
            const btn = document.getElementById('wallet-btn');
            const isApple = /iPhone|iPad|iPod|Mac/.test(navigator.userAgent);
            btn.textContent = isApple ? 'Aggiungi ad Apple Wallet' : 'Aggiungi a Google Wallet';
        }

        function addToWallet() {
            const code = document.getElementById('code-value').textContent;
            const isApple = /iPhone|iPad|iPod|Mac/.test(navigator.userAgent);
            
            if (isApple) {
                window.location.href = `https://wallet.apple.com/pass/${code}`;
            } else {
                window.location.href = `https://pay.google.com/gp/v/save/${code}`;
            }
        }
    </script>
</body>
</html>
